<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>She Can Foundation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(to right ,#d63384,#8e44ad);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    background:#fff;
    width:100%;
    height: 50%;
    max-width:450px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.input-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input, textarea{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

input:focus,
textarea:focus{
    border-color:#667eea;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#667eea;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#4f5bd5;
}

.success{
    text-align:center;
    color:green;
    margin-top:15px;
    font-weight:bold;
}

.error{
    color:red;
    font-size:14px;
}

.logo{
    text-align: center;
    margin-bottom: 15px;
}

.logo img{
    width: 100px;
    height: auto;
    border-radius: 50%;
}
.title{
    text-align: center;
    font-size: 32px;
    font-weight: bold;
    background: linear-gradient(90deg, #a020a0, #ff1493);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 20px;
}
.container{
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{
        box-shadow:0 0 10px rgba(214,51,132,0.3);
    }
    to{
        box-shadow:0 0 25px rgba(214,51,132,0.7);
    }
}


</style>
</head>
<body>

<div class="container">

<div class="logo">
    <img src="logo.jpeg" alt="She can foundation logo">
</div>
<h2 class="title">she can Foundation</h2>
<form id="contactForm">

<div class="input-group">
<label>Name</label>
<input type="text" id="name">
<div class="error" id="nameError"></div>
</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="email">
<div class="error" id="emailError"></div>
</div>

<div class="input-group">
<label>Message</label>
<textarea id="message" rows="4"></textarea>
<div class="error" id="messageError"></div>
</div>

<button type="submit">Submit</button>

<p class="success" id="successMsg"></p>

</form>

</div>

<script>
document.getElementById("contactForm")
.addEventListener("submit", function(e){

e.preventDefault();

document.getElementById("nameError").innerHTML="";
document.getElementById("emailError").innerHTML="";
document.getElementById("messageError").innerHTML="";
document.getElementById("successMsg").innerHTML="";

let name=document.getElementById("name").value.trim();
let email=document.getElementById("email").value.trim();
let message=document.getElementById("message").value.trim();

let valid=true;

if(name===""){
document.getElementById("nameError").innerHTML=
"Name is required";
valid=false;
}

let emailPattern=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

if(!email.match(emailPattern)){
document.getElementById("emailError").innerHTML=
"Enter valid email";
valid=false;
}

if(message.length<10){
document.getElementById("messageError").innerHTML=
"Message must be at least 10 characters";
valid=false;
}

if(valid){

localStorage.setItem("Name",name);
localStorage.setItem("Email",email);
localStorage.setItem("Message",message);

document.getElementById("successMsg").innerHTML=
"✓ Form Submitted Successfully";

document.getElementById("contactForm").reset();
}

});
</script>

</body>
</html>
